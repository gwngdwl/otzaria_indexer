name: Build Otzaria Index

on:
  repository_dispatch:
    types: [seforim-library-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get install -y zstd

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Get dependencies
        run: dart pub get

      - name: Build native search_engine library
        run: |
          dart run tool/build_search_engine.dart
          MANIFEST=$(dart run tool/build_search_engine.dart --check)
          LIB_DIR=$(dirname "$MANIFEST")/target/release
          echo "FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$LIB_DIR" >> $GITHUB_ENV

      - name: Download latest seforim.db.zst
        run: |
          RELEASE_URL="https://api.github.com/repos/Otzaria/SeforimLibrary/releases/latest"

          ASSET_URL=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$RELEASE_URL" | jq -r '.assets[] | select(.name == "seforim.db.zst") | .browser_download_url')

          echo "Downloading $ASSET_URL"
          curl -fsSL -L -o seforim.db.zst "$ASSET_URL"
          echo "Downloaded: $(du -sh seforim.db.zst | cut -f1)"

      - name: Decompress seforim.db
        run: |
          zstd -d --long=31 seforim.db.zst -o seforim.db
          rm seforim.db.zst
          echo "Decompressed: $(du -sh seforim.db | cut -f1)"

      - name: Build search index
        run: |
          dart run bin/main.dart \
            --db seforim.db \
            --output build/index \
            --fresh

      - name: Package index and tantivy.lock
        run: |
          echo "Input sizes:"
          du -sh build/index build/tantivy.lock

          echo "Compressing..."
          time tar --use-compress-program='zstd -19 -T0' \
            -cf otzaria_index.tar.zst \
            -C build \
            index \
            tantivy.lock

          echo "Archive size: $(du -sh otzaria_index.tar.zst | cut -f1) ($(stat -c%s otzaria_index.tar.zst) bytes)"

          # Split into 1900MB parts if needed (GitHub Releases limit is 2GB)
          SIZE=$(stat -c%s otzaria_index.tar.zst)
          if [ "$SIZE" -gt 1990000000 ]; then
            echo "Archive exceeds 1.9GB, splitting..."
            split -b 1900m -d otzaria_index.tar.zst otzaria_index.tar.zst.part
            rm otzaria_index.tar.zst
            echo "Split parts:"
            ls -lh otzaria_index.tar.zst.part*
          else
            echo "Archive fits in a single file, no split needed."
          fi

      - name: Get release tag
        id: tag
        run: echo "tag=index-$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect assets: split parts if they exist, otherwise the single file
          if ls otzaria_index.tar.zst.part* 2>/dev/null; then
            ASSETS=$(ls otzaria_index.tar.zst.part*)
          else
            ASSETS=otzaria_index.tar.zst
          fi

          gh release create "${{ steps.tag.outputs.tag }}" \
            $ASSETS \
            --title "Otzaria Search Index ${{ steps.tag.outputs.tag }}" \
            --notes "$(cat <<'EOF'
          ## התקנה

          ### שלב 1 — הורד את כל הקבצים
          הורד את כל קבצי `otzaria_index.tar.zst.part*` מה-release הזה.

          ### שלב 2 — אחד את החלקים
          ```bash
          # Linux / macOS / Windows (PowerShell)
          cat otzaria_index.tar.zst.part* > otzaria_index.tar.zst
          ```

          ### שלב 3 — חלץ לתיקיית הנתונים של אוצריא
          ```bash
          # Linux / macOS
          tar -xf otzaria_index.tar.zst -C ~/.local/share/otzaria/

          # macOS (אלטרנטיבה)
          tar -xf otzaria_index.tar.zst -C ~/Library/Application\ Support/otzaria/

          # Windows (PowerShell)
          tar -xf otzaria_index.tar.zst -C "$env:APPDATA\otzaria\"
          ```

          לאחר החילוץ תיווצרנה תיקיות `index/` ו-`tantivy.lock/` במקום הנכון.
          פתח את אוצריא — האינדקס יהיה מוכן לשימוש מיידי.
          EOF
          )"
