name: Build Otzaria Index

on:
  repository_dispatch:
    types: [seforim-library-release]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'SeforimLibrary release tag (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get install -y zstd

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Get dependencies
        run: dart pub get

      - name: Download latest seforim.db.zst
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            RELEASE_URL="https://api.github.com/repos/Otzaria/SeforimLibrary/releases/tags/${{ github.event.inputs.release_tag }}"
          else
            RELEASE_URL="https://api.github.com/repos/Otzaria/SeforimLibrary/releases/latest"
          fi

          ASSET_URL=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$RELEASE_URL" | jq -r '.assets[] | select(.name == "seforim.db.zst") | .browser_download_url')

          echo "Downloading $ASSET_URL"
          curl -fsSL -L -o seforim.db.zst "$ASSET_URL"
          echo "Downloaded: $(du -sh seforim.db.zst | cut -f1)"

      - name: Decompress seforim.db
        run: |
          zstd -d seforim.db.zst -o seforim.db
          rm seforim.db.zst
          echo "Decompressed: $(du -sh seforim.db | cut -f1)"

      - name: Build search index
        run: |
          dart run bin/main.dart \
            --db seforim.db \
            --output build/index \
            --fresh

      - name: Package index and tantivy.lock
        run: |
          # build/
          #   index/          ← Tantivy index files
          #   tantivy.lock/   ← Hive state (books_indexed, index-state-version, etc.)
          #
          # The archive root maps directly to %APPDATA%\otzaria\ (Windows)
          # or ~/.local/share/otzaria/ (Linux/macOS).
          # Extract with: tar -xf otzaria_index.tar.zst -C <otzaria-data-dir>

          tar --use-compress-program='zstd -19 -T0' \
            -cf otzaria_index.tar.zst \
            -C build \
            index \
            tantivy.lock

          echo "Archive size: $(du -sh otzaria_index.tar.zst | cut -f1)"
          echo "Archive contents:"
          tar --use-compress-program='zstd -d' -tf otzaria_index.tar.zst | head -20

      - name: Get release tag
        id: tag
        run: echo "tag=index-$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            otzaria_index.tar.zst \
            --title "Otzaria Search Index ${{ steps.tag.outputs.tag }}" \
            --notes "$(cat <<'EOF'
          ## התקנה

          1. הורד את `otzaria_index.tar.zst`
          2. חלץ לתיקיית הנתונים של אוצריא:
             - **Windows**: `%APPDATA%\otzaria\`
             - **Linux**: `~/.local/share/otzaria/`
             - **macOS**: `~/Library/Application Support/otzaria/`

          ```bash
          # Linux / macOS
          tar -xf otzaria_index.tar.zst -C ~/.local/share/otzaria/

          # Windows (PowerShell)
          tar -xf otzaria_index.tar.zst -C "$env:APPDATA\otzaria\"
          ```

          לאחר החילוץ תיווצרנה תיקיות `index/` ו-`tantivy.lock/` במקום הנכון.
          פתח את אוצריא — האינדקס יהיה מוכן לשימוש מיידי.
          EOF
          )"
